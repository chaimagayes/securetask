{% extends 'base.html' %}

{% block title %}Add New Task{% endblock %}

{% block content %}
<div class="card-soft mx-auto" style="max-width: 680px;">
    <div class="mb-4">
        <h2 class="form-heading mb-1">Create New Task</h2>
        <p class="form-subtitle mb-0">Define your task with clear details, deadline, and priority level.</p>
    </div>
    
    <form method="POST">
        <div class="mb-3">
            <label for="title" class="form-label">Task Title <span class="text-danger">*</span></label>
            <input 
                type="text" 
                class="form-control" 
                id="title" 
                name="title" 
                placeholder="e.g., Prepare quarterly report" 
                required
                autofocus
            >
        </div>
        
        <div class="mb-3">
            <label for="description" class="form-label">Description</label>
            <textarea 
                class="form-control" 
                id="description" 
                name="description" 
                rows="4" 
                placeholder="Add any additional details, notes, or requirements (optional)"
            ></textarea>
            <div class="form-text small-muted">Provide context to help you remember what needs to be done.</div>
        </div>
        
        <div class="row g-3 mb-3">
            <div class="col-md-6">
                <label for="due_date" class="form-label">Due Date <span class="text-danger">*</span></label>
                <input 
                    type="date" 
                    class="form-control" 
                    id="due_date" 
                    name="due_date" 
                    required
                >
            </div>
            <div class="col-md-6">
                <label for="priority" class="form-label">Priority Level</label>
                <select class="form-select" id="priority" name="priority">
                    <option value="Low">🟢 Low — Nice to have</option>
                    <option value="Medium" selected>🟡 Medium — Important</option>
                    <option value="High">🔴 High — Urgent</option>
                </select>
            </div>
        </div>
        
        <div class="border-top pt-3 mt-2">
            <div class="form-actions">
                <button type="submit" class="btn btn-primary px-4">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="me-1" viewBox="0 0 16 16" style="margin-bottom: 1px;">
                        <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/>
                        <path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4z"/>
                    </svg>
                    Save Task
                </button>
                <a href="{{ url_for('tasks.dashboard') }}" class="btn btn-ghost">Cancel</a>
            </div>
        </div>
    </form>
</div>
{% endblock %}
