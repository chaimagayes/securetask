{% extends 'base.html' %}

{% block title %}Add New Task{% endblock %}

{% block content %}
<div class="card-soft mx-auto" style="max-width: 680px;">
    <!-- Header -->
    <div class="mb-4">
        <h2 class="form-heading mb-1 d-flex align-items-center gap-2">
            <i class="bi bi-plus-circle text-primary"></i>
            Create New Task
        </h2>
        <p class="form-subtitle mb-0">Define your task with clear details, deadline, and priority level.</p>
    </div>
    
    <!-- Form -->
    <form method="POST">
        <!-- Title -->
        <div class="mb-3">
            <label for="title" class="form-label">
                Task Title <span class="text-danger">*</span>
            </label>
            <input 
                type="text" 
                class="form-control" 
                id="title" 
                name="title" 
                placeholder="e.g., Prepare quarterly report" 
                required
                autofocus
            >
        </div>
        
        <!-- Description -->
        <div class="mb-3">
            <label for="description" class="form-label">
                Description
                <span class="text-muted fw-normal">(optional)</span>
            </label>
            <textarea 
                class="form-control" 
                id="description" 
                name="description" 
                rows="4" 
                placeholder="Add any additional details, notes, or requirements..."
            ></textarea>
            <div class="form-text">
                <i class="bi bi-info-circle me-1"></i>
                Provide context to help you remember what needs to be done.
            </div>
        </div>
        
        <!-- Due Date & Priority -->
        <div class="row g-3 mb-3">
            <div class="col-md-6">
                <label for="due_date" class="form-label">
                    Due Date <span class="text-danger">*</span>
                </label>
                <input 
                    type="date" 
                    class="form-control" 
                    id="due_date" 
                    name="due_date" 
                    required
                >
            </div>
            <div class="col-md-6">
                <label for="priority" class="form-label">Priority Level</label>
                <select class="form-select" id="priority" name="priority">
                    <option value="Low">🟢 Low — Nice to have</option>
                    <option value="Medium" selected>🟡 Medium — Important</option>
                    <option value="High">🔴 High — Urgent</option>
                </select>
            </div>
        </div>
        
        <!-- Form Actions -->
        <div class="border-top pt-3 mt-2">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary px-4 d-flex align-items-center gap-2">
                        <i class="bi bi-check2-circle"></i>
                        Save Task
                    </button>
                    <a href="{{ url_for('tasks.dashboard') }}" class="btn btn-ghost">
                        <i class="bi bi-x-circle me-1"></i>
                        Cancel
                    </a>
                </div>
                
                <button type="reset" class="btn btn-ghost btn-sm text-muted">
                    <i class="bi bi-arrow-counterclockwise me-1"></i>
                    Clear Form
                </button>
            </div>
        </div>
    </form>
</div>
{% endblock %}
