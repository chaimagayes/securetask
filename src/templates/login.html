{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="card-soft mx-auto" style="max-width: 480px;">
    <!-- Header -->
    <div class="text-center mb-4">
        <div class="mb-3">
            <div class="auth-icon-wrapper bg-primary-subtle">
                <i class="bi bi-shield-lock-fill text-primary"></i>
            </div>
        </div>
        <h2 class="form-heading mb-1">Welcome Back</h2>
        <p class="form-subtitle mb-0">Sign in to manage your tasks and stay organized.</p>
    </div>
    
    <!-- Login Form -->
    <form method="POST" action="{{ url_for('auth.login') }}" novalidate>
        <!-- Username -->
        <div class="mb-3">
            <label for="username" class="form-label">
                <i class="bi bi-person me-1"></i>
                Username
            </label>
            <div class="input-group">
                <span class="input-group-text input-icon-left">
                    <i class="bi bi-person-fill"></i>
                </span>
                <input 
                    type="text" 
                    class="form-control border-start-0 ps-0" 
                    id="username" 
                    name="username" 
                    placeholder="Enter your username" 
                    required
                    autofocus
                    autocomplete="username"
                >
            </div>
        </div>
        
        <!-- Password -->
        <div class="mb-3">
            <div class="d-flex justify-content-between align-items-center mb-1">
                <label for="password" class="form-label mb-0">
                    <i class="bi bi-key me-1"></i>
                    Password
                </label>
                <a href="#" class="forgot-link">
                    Forgot password?
                </a>
            </div>
            <div class="input-group">
                <span class="input-group-text input-icon-left">
                    <i class="bi bi-lock-fill"></i>
                </span>
                <input 
                    type="password" 
                    class="form-control border-start-0 border-end-0 ps-0" 
                    id="password" 
                    name="password" 
                    placeholder="Enter your password" 
                    required
                    autocomplete="current-password"
                >
                <button 
                    class="btn input-icon-right" 
                    type="button" 
                    id="togglePassword"
                    title="Show password"
                >
                    <i class="bi bi-eye-slash"></i>
                </button>
            </div>
        </div>
        
        <!-- Remember Me -->
        <div class="mb-4">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="remember" name="remember">
                <label class="form-check-label small" for="remember">
                    Keep me signed in for 30 days
                </label>
            </div>
        </div>
        
        <!-- Submit Button -->
        <button type="submit" class="btn btn-primary w-100 mb-3 d-flex align-items-center justify-content-center gap-2 py-2">
            <i class="bi bi-box-arrow-in-right"></i>
            Sign in
        </button>
        
        <!-- Register Link -->
        <div class="text-center">
            <span class="text-muted small">Don't have an account?</span>
            <a href="{{ url_for('auth.register') }}" class="btn btn-ghost btn-sm ms-1">
                <i class="bi bi-person-plus me-1"></i>
                Create Account
            </a>
        </div>
    </form>
    
    <!-- Footer -->
    <div class="auth-footer">
        <p class="small-muted mb-0">
            <i class="bi bi-shield-check me-1"></i>
            Secure login with encrypted credentials
        </p>
    </div>
</div>

<!-- Password Toggle Script -->
<script>
(function() {
    const toggleBtn = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    const icon = toggleBtn.querySelector('i');
    
    toggleBtn.addEventListener('click', function() {
        const isPassword = passwordInput.type === 'password';
        passwordInput.type = isPassword ? 'text' : 'password';
        icon.classList.toggle('bi-eye', isPassword);
        icon.classList.toggle('bi-eye-slash', !isPassword);
        toggleBtn.setAttribute('title', isPassword ? 'Hide password' : 'Show password');
    });
})();
</script>

<!-- Page-specific styles -->
<style>
/* Auth icon wrapper */
.auth-icon-wrapper {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 64px;
    height: 64px;
    border-radius: 50%;
}

.auth-icon-wrapper i {
    font-size: 1.8rem;
}

/* Input group icons */
.input-icon-left {
    background: #f8fafc;
    border-right: 0;
    color: #94a3b8;
}

.input-icon-left i {
    font-size: 0.9rem;
}

.input-icon-right {
    background: #f8fafc;
    border: 1px solid #cbd5e1;
    border-left: 0;
    color: #94a3b8;
    padding: 0.375rem 0.75rem;
    transition: all var(--transition);
}

.input-icon-right:hover {
    background: #f1f5f9;
    color: #64748b;
}

.input-icon-right i {
    font-size: 0.9rem;
}

/* Forgot password link */
.forgot-link {
    color: var(--accent);
    font-size: 0.8125rem;
    font-weight: 500;
    text-decoration: none;
    transition: color var(--transition);
}

.forgot-link:hover {
    color: var(--accent-strong);
    text-decoration: underline;
}

/* Auth footer */
.auth-footer {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1rem;
    border-top: 1px solid var(--line);
}

/* Form check customization */
.form-check-input {
    cursor: pointer;
    border-color: #cbd5e1;
}

.form-check-input:checked {
    background-color: var(--accent);
    border-color: var(--accent);
}

.form-check-input:focus {
    border-color: #a5b4fc;
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
}

.form-check-label {
    cursor: pointer;
    color: #475569;
}

/* Responsive */
@media (max-width: 576px) {
    .card-soft {
        padding: 20px;
    }
    
    .auth-icon-wrapper {
        width: 56px;
        height: 56px;
    }
    
    .auth-icon-wrapper i {
        font-size: 1.5rem;
    }
}
</style>
{% endblock %}
