name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ENV_FILE
          script: |
            set -e

            # Install Docker Engine + Compose v2 plugin if missing
            if ! command -v docker &>/dev/null; then
              curl -fsSL https://get.docker.com | sudo sh
              sudo usermod -aG docker $USER
            fi

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" \
              | sudo docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # Clone repo on first deploy, pull updates after
            if [ ! -d "$HOME/securetask" ]; then
              git clone https://github.com/${{ github.repository }}.git "$HOME/securetask"
            else
              git -C "$HOME/securetask" pull
            fi

            cd "$HOME/securetask"

            # Write .env from secret (overwrite on every deploy)
            printf '%s' "$ENV_FILE" > .env

            export APP_IMAGE="ghcr.io/${{ github.repository }}:latest"
            sudo -E docker compose pull app

            CERT_PATH="/var/lib/docker/volumes/securetask_certbot_certs/_data/live/securetask.me/fullchain.pem"

            # First deploy: get cert before enabling SSL in nginx
            if [ ! -f "$CERT_PATH" ]; then
              # Disable SSL config so nginx starts on HTTP only
              sudo rm -f "$HOME/securetask/nginx/conf.d/ssl.conf"
              sudo -E docker compose up -d nginx app db
              sleep 5
              # Obtain certificate via webroot challenge
              sudo docker run --rm \
                -v securetask_certbot_webroot:/var/www/certbot \
                -v securetask_certbot_certs:/etc/letsencrypt \
                certbot/certbot certonly --webroot \
                  -w /var/www/certbot \
                  -d securetask.me -d www.securetask.me \
                  --email chaymagayes@gmail.com \
                  --agree-tos --no-eff-email --non-interactive
              # Restore SSL config and reload nginx
              sudo git -C "$HOME/securetask" checkout nginx/conf.d/ssl.conf
              sudo docker compose exec nginx nginx -s reload
            fi

            sudo -E docker compose up -d --no-build
            sudo -E docker image prune -f
